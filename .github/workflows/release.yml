name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Create the GitHub Release first so parallel build jobs can upload to it ──
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Extract tag name
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false

  # ── Windows x64 build ──────────────────────────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (Vite)
        run: bun run vite build

      - name: Build app (Electrobun stable)
        run: bunx electrobun build --env=stable

      # Rename to the flat prefix-based names the updater expects:
      #   {baseUrl}/stable-win-x64-update.json          ← checked by Updater.checkForUpdate()
      #   {baseUrl}/stable-win-x64-AutoDesk.tar.zst     ← downloaded by Updater.downloadUpdate()
      - name: Prepare distribution files
        shell: pwsh
        run: |
          $dir = "build/stable-win-x64"
          Copy-Item "$dir/AutoDesk-Setup.metadata.json" "$dir/stable-win-x64-update.json"
          Copy-Item "$dir/AutoDesk-Setup.tar.zst"       "$dir/stable-win-x64-AutoDesk.tar.zst"

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            build/stable-win-x64/AutoDesk-Setup.exe
            build/stable-win-x64/stable-win-x64-update.json
            build/stable-win-x64/stable-win-x64-AutoDesk.tar.zst
          fail_on_unmatched_files: true

  # ── macOS arm64 build (Apple Silicon) ──────────────────────────────────────
  build-macos-arm64:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (Vite)
        run: bun run vite build

      - name: Build app (Electrobun stable)
        run: bunx electrobun build --env=stable

      - name: Prepare distribution files
        run: |
          dir="build/stable-macos-arm64"
          ls -la "$dir"
          metadata=$(find "$dir" -maxdepth 1 -name "*.metadata.json" | head -1)
          tarball=$(find "$dir"  -maxdepth 1 -name "*.tar.zst"       | head -1)
          cp "$metadata" "$dir/stable-macos-arm64-update.json"
          cp "$tarball"  "$dir/stable-macos-arm64-AutoDesk.app.tar.zst"

      - name: Upload macOS arm64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            build/stable-macos-arm64/*.dmg
            build/stable-macos-arm64/stable-macos-arm64-update.json
            build/stable-macos-arm64/stable-macos-arm64-AutoDesk.app.tar.zst
          fail_on_unmatched_files: true

  # ── macOS x64 build (Intel) ────────────────────────────────────────────────
  build-macos-x64:
    needs: create-release
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (Vite)
        run: bun run vite build

      - name: Build app (Electrobun stable)
        run: bunx electrobun build --env=stable

      - name: Prepare distribution files
        run: |
          dir="build/stable-macos-x64"
          ls -la "$dir"
          metadata=$(find "$dir" -maxdepth 1 -name "*.metadata.json" | head -1)
          tarball=$(find "$dir"  -maxdepth 1 -name "*.tar.zst"       | head -1)
          cp "$metadata" "$dir/stable-macos-x64-update.json"
          cp "$tarball"  "$dir/stable-macos-x64-AutoDesk.app.tar.zst"

      - name: Upload macOS x64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            build/stable-macos-x64/*.dmg
            build/stable-macos-x64/stable-macos-x64-update.json
            build/stable-macos-x64/stable-macos-x64-AutoDesk.app.tar.zst
          fail_on_unmatched_files: true
