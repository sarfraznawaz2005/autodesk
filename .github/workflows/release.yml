name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Create the GitHub Release first so parallel build jobs can upload to it ──
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Extract tag name
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false

  # ── Windows x64 build ──────────────────────────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (Vite)
        run: bun run vite build

      - name: Build app (Electrobun stable)
        run: bunx electrobun build --env=stable

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: build/stable-win-x64/**
          fail_on_unmatched_files: false

  # ── macOS arm64 build (Apple Silicon) ──────────────────────────────────────
  build-macos-arm64:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (Vite)
        run: bun run vite build

      - name: Build app (Electrobun stable)
        run: bunx electrobun build --env=stable

      - name: Upload macOS arm64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: build/stable-macos-arm64/**
          fail_on_unmatched_files: false

  # ── macOS x64 build (Intel) ────────────────────────────────────────────────
  build-macos-x64:
    needs: create-release
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (Vite)
        run: bun run vite build

      - name: Build app (Electrobun stable)
        run: bunx electrobun build --env=stable

      - name: Upload macOS x64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: build/stable-macos-x64/**
          fail_on_unmatched_files: false
